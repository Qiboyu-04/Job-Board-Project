<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}学生求职网 | 开启职业生涯{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 这里可以加一些你喜欢的自定义样式 */
        .hover-lift {
            transition: transform 0.2s ease-in-out;
        }
        .hover-lift:hover {
            transform: translateY(-3px);
        }
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-graduation-cap me-2"></i>学生求职平台
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">首页</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link {% if '/jobs/' in request.path %}active{% endif %}" href="/jobs/">职位列表</a>
                    </li>

                    {% if user.is_authenticated %}
                        {% if user.profile.user_type == 'employer' %}
                        <li class="nav-item">
                            <a class="nav-link {% if '/company/dashboard/' in request.path %}active{% endif %}" href="{% url 'company_dashboard' %}">公司后台</a>
                        </li>
                        {% endif %}

                        <li class="nav-item">
                            <a class="nav-link {% if '/saved/' in request.path %}active{% endif %}" href="{% url 'saved_jobs' %}">收藏职位</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">退出登录</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link {% if '/login/' in request.path %}active{% endif %}" href="{% url 'login' %}">登录</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if '/register/' in request.path %}active{% endif %}" href="{% url 'register' %}">注册</a>
                        </li>
                    {% endif %}
                    </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-4 mt-5 bg-white border-top">
        <div class="container text-center text-muted">
            <small>&copy; 2026 大学生求职服务项目 | 助力每一位同学</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
