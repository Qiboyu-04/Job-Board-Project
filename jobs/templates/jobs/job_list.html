{% extends "jobs/base.html" %}

{% block content %}

<h2>Job Listings</h2>

<form method="get">
    <input type="text" name="q" placeholder="Search by title" value="{{ query }}">

    <input type="text" name="location" placeholder="Search by location" value="{{ selected_location }}">

    <select name="type">
        <option value="">All Types</option>
        <option value="intern" {% if selected_type == "intern" %}selected{% endif %}>Intern</option>
        <option value="part-time" {% if selected_type == "part-time" %}selected{% endif %}>Part-time</option>
        <option value="full-time" {% if selected_type == "full-time" %}selected{% endif %}>Full-time</option>
    </select>

    <button type="submit">Search</button>
</form>

<ul>

{% for job in jobs %}

<li>
<h3>
    <a href="{% url 'job_detail' job.id %}">{{ job.title }}</a>
</h3>
<p>Company: {{ job.company }}</p>
<p>Location: {{ job.location }}</p>
<p>Type: {{ job.job_type }}</p>
<p>Deadline: {{ job.deadline }}</p>
<p><a href="{% url 'job_detail' job.id %}">View Details</a></p>
</li>

{% endfor %}

</ul>

{% endblock %}
